# Site settings
title: ahmet
description: >-
  Personal Space
lang: tr-TR
timezone: Europe/Istanbul
image: assets/img/ogp.png # This image used for Open Graph more info https://ogp.me/
mode: light

# Profile settings
author:
  name: ahmet
  bio: >-
    I'm a curious, communicative, resourceful and technology agnostic software developer
    and this is my very own personal space.
  github: badinn
  linkedin: badin
  email: abadin@windowslive.com
  avatar: /assets/img/logo.svg

# URL settings
url: "https://ahmetbadin.com" #
baseurl:
permalink: /read/:title:output_ext
google_analytics: # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 5

sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
